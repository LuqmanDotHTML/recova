name: lost_and_found
description: UniFind - University Lost & Found App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # State Management
  provider: ^6.1.0

  # UI & UX
  google_fonts: ^6.2.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # Forms & Media
  image_picker: ^1.1.0
  intl: ^0.19.0

  # Navigation
  go_router: ^14.0.0

  # Theme Persistence
  shared_preferences: ^2.3.0

  # Utilities
  timeago: ^3.7.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
